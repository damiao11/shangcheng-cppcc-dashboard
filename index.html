<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>上城区政协界别工作台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=PingFang+SC:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent-primary: #3a67ab;        /* 深蓝 */
            --accent-secondary: #bacbe3;      /* 浅紫蓝 */
            --bg-light: #def1f5;            /* 淡蓝背景 */
            --accent-cyan: #c5e8ee;          /* 青蓝 */
            --radius-custom: 28px;
        }

        body { 
            font-family: "PingFang SC", system-ui, sans-serif; 
            background: linear-gradient(135deg, var(--bg-light) 0%, var(--accent-cyan) 100%);
            color: #1e293b;
            min-height: 100vh;
        }

        .platform-shell { max-width: 1400px; margin: 0 auto; padding: 24px; }

        .nav-item { position: relative; padding: 10px 20px; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; border-radius: 14px; }
        .nav-item:hover { background: var(--accent-secondary); color: var(--accent-primary); }
        .nav-item.active { color: white; font-weight: 700; background: var(--accent-primary); box-shadow: 0 4px 12px rgba(58, 103, 171, 0.2); }

        .top-nav { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(20px); border: 1px solid var(--accent-secondary); border-radius: var(--radius-custom); }

        .sector-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); border-radius: 24px; border: 1px solid var(--accent-secondary); transition: all 0.4s ease; cursor: pointer; position: relative; overflow: hidden; }
        .sector-card:hover { transform: translateY(-8px); box-shadow: 0 20px 40px -12px rgba(58, 103, 171, 0.15); border-color: var(--accent-primary); }

        .plan-card { background: white; border-radius: 20px; border-left: 4px solid var(--accent-primary); transition: all 0.3s ease; cursor: pointer; }
        .plan-card:hover { transform: translateX(10px); background: var(--bg-light); }

        .detail-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); z-index: 100; display: none; align-items: center; justify-content: center; padding: 24px; }
        .detail-content { background: white; width: 100%; max-width: 1000px; max-height: 85vh; border-radius: 36px; overflow-y: auto; position: relative; box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.3); animation: pop 0.5s cubic-bezier(0.17, 0.67, 0.16, 0.99); }
        @keyframes pop { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        .glass-tag { background: var(--accent-cyan); color: var(--accent-primary); padding: 4px 12px; border-radius: 10px; font-size: 11px; font-weight: 700; }
        
        .timeline-container { position: relative; padding-left: 2rem; }
        .timeline-container::before { content: ''; position: absolute; left: 0.75rem; top: 0; bottom: 0; width: 2px; background: var(--accent-secondary); }
        .timeline-dot { position: absolute; left: 0.45rem; width: 0.75rem; height: 0.75rem; border-radius: 50%; background: var(--accent-primary); border: 2px solid white; box-shadow: 0 0 0 4px var(--accent-secondary); }
    </style>
</head>
<body class="min-h-screen">

            <div id="data-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 pb-20">
                <!-- JS Inject -->
            </div>
        </div>
    </div>

        function renderSectors() {
            document.getElementById('view-title').innerHTML = `全区 16 个界别矩阵 <span class="h-px flex-1 bg-slate-100"></span>`;
            const container = document.getElementById('data-grid');
            container.className = "grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 pb-20";
            container.innerHTML = sectors.map(s => `
                <div class="sector-card p-10 flex flex-col" onclick="showSectorDetail('${s.name}')">
                    <div class="flex justify-between items-center mb-6 text-[#bacbe3] font-black">#${s.id}</div>
                    <h3 class="text-2xl font-bold text-slate-800 mb-2">${s.name}</h3>
                    <p class="text-xs text-[#3a67ab] font-bold mb-4">${s.desc}</p>
                    <p class="text-xs text-slate-500 leading-relaxed line-clamp-3">${s.content}</p>
                </div>
            `).join('');
        }

        function renderPlans() {

                    <div class="plan-card p-6 shadow-sm flex items-center justify-between" onclick="showPlanDetail('${p.topic}')">

                        </div>
                    </div>
                </div>
            `).join('');

        function renderStudios() {

                    <p class="text-[10px] text-slate-400 mb-8 italic">领衔: ${s.leader}</p>
                    <div class="mt-auto p-4 bg-slate-50 rounded-2xl text-[10px] text-slate-500">${s.feature}</div>
                </div>
            `).join('');
        }

        function renderActivities() {
            document.getElementById('view-title').innerHTML = `基层履职照片墙 <span class="h-px flex-1 bg-slate-100"></span>`;
            const container = document.getElementById('data-grid');
            container.className = "grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 pb-20";
            container.innerHTML = activitiesData.map(a => `
                <div class="sector-card overflow-hidden flex flex-col" onclick="showActivityDetail('${a.title}')">
                    <div class="aspect-video bg-neutral-100 overflow-hidden">
                        <img src="${a.img}" class="w-full h-full object-cover transition-transform duration-700 hover:scale-110">
                    </div>
                    <div class="p-6">
                        <span class="text-[9px] font-black text-[#3a67ab] uppercase tracking-widest">${a.unit}</span>
                        <h4 class="text-xs font-bold text-slate-800 line-clamp-1 mt-2">${a.title}</h4>
                    </div>
                </div>
            `).join('');
        }

        function switchTab(type, el) {
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
            if(type === 'sectors') renderSectors();
            if(type === 'plans') renderPlans();
            if(type === 'studios') renderStudios();
            if(type === 'activities') renderActivities();
        }

        function showSectorDetail(name) {
            const data = sectors.find(s => s.name === name);
            document.getElementById('modal-tag').innerText = "界别详情";
            document.getElementById('modal-title').innerText = data.name;
            document.getElementById('modal-body').innerHTML = `
                <div class="space-y-8">
                    <div>
                        <h4 class="text-xs font-black text-[#3a67ab] mb-4 tracking-widest uppercase">Summary / 简介</h4>
                        <p class="text-lg text-slate-800 leading-relaxed font-medium">${data.content}</p>
                    </div>
                    <div class="bg-[#def1f5] p-8 rounded-3xl border border-[#bacbe3]">
                        <h4 class="text-xs font-black text-[#3a67ab] mb-6 uppercase">Sector Info / 界别信息</h4>
                        <div class="space-y-4 text-sm font-bold border-t border-[#bacbe3] pt-4">
                            <div class="flex justify-between"><span>联系领导:</span> <span class="text-[#3a67ab]">${data.desc.replace("联系领导：", "")}</span></div>
                            <div class="flex justify-between"><span>成员规模:</span> <span class="text-[#3a67ab]">${data.members.split(',').length} 人</span></div>
                        </div>
                    </div>
                </div>
                <div class="bg-slate-50 p-8 rounded-3xl border border-slate-200">
                    <div class="flex items-center justify-between mb-6">
                        <h4 class="text-xs font-black text-slate-400 uppercase">Members / 成员介绍</h4>
                        <span class="px-3 py-1 bg-white rounded-full text-[10px] font-bold text-[#3a67ab] border border-[#bacbe3]">名单公示</span>
                    </div>
                    <div class="flex flex-wrap gap-2">
                        ${data.members.split(',').map(m => `<span class="px-3 py-1.5 bg-white rounded-xl text-xs font-semibold text-slate-700 shadow-sm border border-slate-100 hover:border-[#3a67ab] transition-colors">${m.trim()}</span>`).join('')}
                    </div>
                </div>
            `;
            document.getElementById('modal-container').style.display = 'flex';
        }

        function showPlanDetail(topic) {
            const data = plans.find(p => p.topic === topic);
            document.getElementById('modal-tag').innerText = "年度计划";
            document.getElementById('modal-title').innerText = data.month + " 计划详情";
            document.getElementById('modal-body').innerHTML = `
                <div class="col-span-2 bg-[#def1f5] p-10 rounded-[32px] border border-[#bacbe3]">
                    <h4 class="text-2xl font-bold text-slate-800 mb-4">${data.topic}</h4>
                    <p class="text-slate-600 mb-8 font-medium">执行单位：${data.unit}</p>
                    <div class="flex gap-4">
                        <div class="px-6 py-2 bg-white rounded-full text-xs font-bold shadow-sm">状态：待启动</div>
                        <div class="px-6 py-2 bg-white rounded-full text-xs font-bold shadow-sm">时间：2024年${data.month}</div>
                    </div>
                </div>
            `;
            document.getElementById('modal-container').style.display = 'flex';
        }

        function showStudioDetail(name) {
            const data = studios.find(s => s.name === name);
            document.getElementById('modal-tag').innerText = "工作室详情";
            document.getElementById('modal-title').innerText = data.name;
            document.getElementById('modal-body').innerHTML = `
                <div class="col-span-2 bg-[#3a67ab] p-10 text-white rounded-3xl flex justify-between">
                    <div><p class="text-[#bacbe3] text-[10px] font-bold">领衔委员</p><h3 class="text-3xl font-black">${data.leader}</h3></div>
                    <div class="text-right"><p class="text-[#bacbe3] text-[10px] font-bold">星级评定</p><h3 class="text-3xl font-black">${data.rating}</h3></div>
                </div>
                <div class="col-span-2 p-8 border border-[#bacbe3] rounded-3xl">
                    <h4 class="font-bold mb-2">工作室亮点</h4>
                    <p class="text-slate-500 font-medium">${data.feature}</p>
                    <p class="text-sm text-slate-400 mt-6 border-t border-[#bacbe3] pt-4 italic">${data.address}</p>
                </div>
            `;
            document.getElementById('modal-container').style.display = 'flex';
        }

        function showActivityDetail(title) {
            const data = activitiesData.find(a => a.title === title);
            document.getElementById('modal-tag').innerText = "纪实回顾";
            document.getElementById('modal-title').innerText = "履职瞬间";
            document.getElementById('modal-body').innerHTML = `
                <div class="col-span-2">
                    <img src="${data.img}" class="w-full rounded-[32px] shadow-2xl mb-8 border-4 border-white max-h-[400px] object-cover">
                    <div class="p-8 bg-[#def1f5] rounded-3xl border border-[#bacbe3] text-center">
                        <span class="text-xs font-bold text-[#3a67ab] mb-2 block tracking-widest uppercase">${data.unit}</span>
                        <h4 class="text-2xl font-black text-slate-900 leading-tight">${data.title}</h4>
                    </div>
                </div>
            `;
            document.getElementById('modal-container').style.display = 'flex';
        }

        function closeModal() { document.getElementById('modal-container').style.display = 'none'; }
        
        // Init
        renderSectors();
    </script>
</body>
</html>
