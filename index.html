        <div class="stat-card"><div class="text-2xl font-black text-[#3a67ab]">300+</div><div class="text-xs text-slate-500 mt-1">街道委员</div></div>

        <div class="stat-card"><div class="text-2xl font-black text-[#3a67ab]">2</div><div class="text-xs text-slate-500 mt-1">实践分中心</div></div>`;
}

// ===== RENDER FUNCTIONS =====
function renderSectors(filter) {
    document.getElementById('view-title').innerHTML = '全区 16 个界别矩阵 <span class="h-px flex-1 bg-slate-100 hidden md:block"></span>';
    const container = document.getElementById('data-grid');
    container.className = "grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 pb-20";
    let data = sectors;
    if (filter) data = sectors.filter(s => s.name.includes(filter) || s.content.includes(filter) || s.desc.includes(filter));
    container.innerHTML = data.map(s => `
        <div class="sector-card p-6 flex flex-col" onclick="showSectorDetail('${s.id}')">
            ${s.photos && s.photos[0] ? `<img src="${BASE_PATH+escapeHtml(s.photos[0])}" class="sector-photo" onerror="this.style.display='none'" loading="lazy">` : ''}
            <div class="flex justify-between items-center mb-3 text-[#bacbe3] font-black text-sm">#${s.id}</div>
            <h3 class="text-xl font-bold text-slate-800 mb-1">${escapeHtml(s.name)}</h3>
            <p class="text-xs text-[#3a67ab] font-bold mb-2">联系领导：${escapeHtml(s.leader)}</p>
            <p class="text-xs text-slate-500 leading-relaxed line-clamp-2">${escapeHtml(s.desc)}</p>
            <div class="mt-auto pt-3 flex items-center gap-2 text-[10px] text-slate-400">
                <span>📷 ${s.photos ? s.photos.length : 0}张</span>
                <span>👥 ${s.members ? s.members.split(',').length : 0}人</span>
            </div>
        </div>
    `).join('');
    document.getElementById('search-input').classList.remove('hidden');
}

function renderPlans(filter) {
    document.getElementById('view-title').innerHTML = '2026 年度履职计划 <span class="h-px flex-1 bg-slate-100 hidden md:block"></span>';
    const container = document.getElementById('data-grid');
    container.className = "max-w-4xl mx-auto space-y-4 pb-20";
    let data = plans2026;
    if (filter) data = plans2026.filter(p => p.sector.includes(filter) || p.activity.includes(filter) || p.type.includes(filter) || p.time.includes(filter));
    const grouped = {};
    data.forEach(p => { const m = p.month; if(!grouped[m]) grouped[m]=[]; grouped[m].push(p); });
    const sortedMonths = Object.keys(grouped).sort((a,b)=>a-b);
    container.innerHTML = sortedMonths.map(m => `
        <div class="mb-8">
            <div class="text-sm font-black text-[#3a67ab] mb-3 pl-4">${m}月</div>
            <div class="space-y-3">
                ${grouped[m].map(p => `
                    <div class="plan-card p-5 shadow-sm flex items-center justify-between" onclick="showPlanDetail('${p.sector.replace(/'/g,"&#39;")}', '${p.activity.replace(/'/g,"&#39;").replace(/"/g,"&quot;")}')">
                        <div class="flex items-center gap-5">
                            <div class="month-badge ${getMonthClass(parseInt(m))}">${p.time}</div>
                            <div>
                                <h4 class="font-bold text-slate-800 mb-1">${escapeHtml(p.activity)}</h4>
                                <div class="flex items-center gap-3">
                                    <span class="text-xs text-[#3a67ab] font-bold">${escapeHtml(p.sector)}</span>
                                    <span class="glass-tag">${escapeHtml(p.type)}</span>
                                </div>
                            </div>
                        </div>
                        <div class="text-slate-300 flex-shrink-0">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                        </div>
                    </div>
                `).join('')}
            </div>
        </div>
    `).join('');
    document.getElementById('search-input').classList.remove('hidden');
}

function renderStudios(filter) {
    document.getElementById('view-title').innerHTML = '委员工作室 (共50个) <span class="h-px flex-1 bg-slate-100 hidden md:block"></span>';
    const container = document.getElementById('data-grid');
    container.className = "grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5 pb-20";
    let data = studios;
    if (filter) data = studios.filter(s => s.name.includes(filter) || s.leader.includes(filter) || s.address.includes(filter) || s.feature.includes(filter));
    container.innerHTML = data.map(s => `
        <div class="studio-card p-5 flex flex-col" onclick="showStudioDetail(${s.id})">
            <div class="flex justify-between items-start mb-3">
                <span class="glass-tag">#${s.id}</span>
                <span>${starHtml(s.rating)}</span>
            </div>
            <h3 class="font-bold text-slate-800 mb-1 text-sm leading-tight line-clamp-2">${escapeHtml(s.name)}</h3>
            <p class="text-[11px] text-slate-400 mb-3">领衔：${escapeHtml(s.leader)}</p>
            <div class="mt-auto p-3 bg-slate-50 rounded-xl text-[10px] text-slate-500">
                <div class="truncate">📍 ${escapeHtml(s.address)}</div>
                ${s.feature ? `<div class="text-[#3a67ab] font-bold mt-1">🏷 ${escapeHtml(s.feature)}</div>` : ''}
            </div>
        </div>
    `).join('');
    document.getElementById('search-input').classList.remove('hidden');
}

function renderActivities(filter) {
    document.getElementById('view-title').innerHTML = '基层履职照片墙 <span class="h-px flex-1 bg-slate-100 hidden md:block"></span>';
    const container = document.getElementById('data-grid');
    container.innerHTML = `
        <div class="col-span-full flex gap-3 mb-2 flex-wrap" id="activity-tabs">
            <button class="px-4 py-1.5 rounded-full text-xs font-bold bg-[#3a67ab] text-white" onclick="renderActivitySection('studio')">委员履职平台 (${activities.length})</button>
            <button class="px-4 py-1.5 rounded-full text-xs font-bold bg-slate-200 text-slate-600" onclick="renderActivitySection('subcenter')">实践分中心 (${subcenterPhotos.length})</button>
            <button class="px-4 py-1.5 rounded-full text-xs font-bold bg-slate-200 text-slate-600" onclick="renderActivitySection('sector')">界别活动</button>
        </div>
        <div class="col-span-full" id="activity-content"></div>
    `;
    container.className = "pb-20";
    document.getElementById('search-input').classList.add('hidden');
    renderActivitySection('studio');
}

function renderActivitySection(type) {
    const tabs = document.querySelectorAll('#activity-tabs button');
    tabs.forEach(t => { t.classList.remove('bg-[#3a67ab]','text-white'); t.classList.add('bg-slate-200','text-slate-600'); });
    const target = document.getElementById('activity-content');
    let photos = [];
    if (type === 'studio') {
        tabs[0].classList.add('bg-[#3a67ab]','text-white'); tabs[0].classList.remove('bg-slate-200','text-slate-600');
        photos = activities;
    } else if (type === 'subcenter') {
        tabs[1].classList.add('bg-[#3a67ab]','text-white'); tabs[1].classList.remove('bg-slate-200','text-slate-600');
        photos = subcenterPhotos;
    } else {
        tabs[2].classList.add('bg-[#3a67ab]','text-white'); tabs[2].classList.remove('bg-slate-200','text-slate-600');
        sectors.forEach(s => {
            if(s.photos) s.photos.forEach(p => photos.push({title: s.name+"界别活动", unit: s.name, img: p}));
        });
    }
    target.innerHTML = `<div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-5">${photos.map(a => `
        <div class="photo-card" onclick="openLightbox('${BASE_PATH+escapeHtml(a.img)}')">
            <img src="${BASE_PATH+escapeHtml(a.img)}" loading="lazy" onerror="this.parentElement.style.display='none'">
            <div class="photo-overlay">
                <div>
                    <span class="text-[9px] text-white/70 font-bold block">${escapeHtml(a.unit)}</span>
                    <span class="text-xs text-white font-bold line-clamp-2">${escapeHtml(a.title)}</span>
                </div>
            </div>
        </div>
    `).join('')}</div>`;
}

function renderStreets() {
    document.getElementById('view-title').innerHTML = '14个街道委员小组 <span class="h-px flex-1 bg-slate-100 hidden md:block"></span>';
    const container = document.getElementById('data-grid');
    container.className = "grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 pb-20";
    container.innerHTML = streets.map((st,i) => `
        <div class="sector-card p-6 flex flex-col">
            <div class="flex justify-between items-center mb-4">
                <span class="text-2xl font-black text-[#bacbe3]">#${String(i+1).padStart(2,'0')}</span>
                <span class="glass-tag">${escapeHtml(st.studio)}</span>
            </div>
            <h3 class="text-xl font-bold text-slate-800 mb-2">${escapeHtml(st.name)}</h3>
            <p class="text-xs text-[#3a67ab] font-bold mb-2">联系领导：${escapeHtml(st.leader)}</p>
            <p class="text-xs text-slate-500 leading-relaxed">${escapeHtml(st.desc)}</p>
        </div>
    `).join('');
    document.getElementById('search-input').classList.add('hidden');
}

function escapeHtml(str) {
    if (!str) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function doSearch() {
    const val = document.getElementById('search-input').value.trim();
    const activeTab = document.querySelector('.nav-item.active');
    if (!activeTab) return;
    const text = activeTab.innerText;
    if(text.includes('界别概览')) renderSectors(val);
    else if(text.includes('年度计划')) renderPlans(val);
    else if(text.includes('工作室')) renderStudios(val);
}

// ===== MODAL FUNCTIONS =====
function showSectorDetail(id) {
    const data = sectors.find(s => s.id === id);
    document.getElementById('modal-tag').innerText = "界别详情";
    document.getElementById('modal-title').innerText = data.name + "界别";
    const photoGallery = data.photos ? data.photos.map(p => `
        <img src="${BASE_PATH+escapeHtml(p)}" class="w-full h-24 object-cover rounded-xl cursor-pointer hover:opacity-80 transition" onclick="openLightbox('${BASE_PATH+escapeHtml(p)}')" loading="lazy" onerror="this.style.display='none'">
    `).join('') : '';
    document.getElementById('modal-body').innerHTML = `
        <div class="space-y-8">
            <div>
                <h4 class="text-xs font-black text-[#3a67ab] mb-4 tracking-widest uppercase">Summary / 简介</h4>
                <p class="text-lg text-slate-800 leading-relaxed font-medium">${escapeHtml(data.content)}</p>
            </div>
            ${photoGallery ? `<div>
                <h4 class="text-xs font-black text-[#3a67ab] mb-4 tracking-widest uppercase">Activity Photos / 活动照片</h4>
                <div class="grid grid-cols-2 gap-3">${photoGallery}</div>
            </div>` : ''}
            <div class="bg-[#def1f5] p-8 rounded-3xl border border-[#bacbe3]">
                <h4 class="text-xs font-black text-[#3a67ab] mb-6 uppercase">Sector Info / 界别信息</h4>
                <div class="space-y-3 text-sm font-bold border-t border-[#bacbe3] pt-4">
                    <div class="flex justify-between"><span>联系领导:</span> <span class="text-[#3a67ab]">${escapeHtml(data.leader)}</span></div>
                    <div class="flex justify-between"><span>成员规模:</span> <span class="text-[#3a67ab]">${data.members.split(',').length} 人</span></div>
                    <div class="flex justify-between"><span>界别编号:</span> <span class="text-[#3a67ab]">#${data.id}</span></div>
                </div>
            </div>
        </div>
        <div class="bg-slate-50 p-8 rounded-3xl border border-slate-200">
            <div class="flex items-center justify-between mb-6">
                <h4 class="text-xs font-black text-slate-400 uppercase">Members / 成员介绍</h4>
                <span class="px-3 py-1 bg-white rounded-full text-[10px] font-bold text-[#3a67ab] border border-[#bacbe3]">公示名单</span>
            </div>
            <div class="flex flex-wrap gap-2">
                ${data.members.split(',').map(m => `<span class="px-3 py-1.5 bg-white rounded-xl text-xs font-semibold text-slate-700 shadow-sm border border-slate-100 hover:border-[#3a67ab] transition-colors">${escapeHtml(m.trim())}</span>`).join('')}
            </div>
        </div>
    `;
    document.getElementById('modal-container').style.display = 'flex';
}

function showPlanDetail(sector, activity) {
    const data = plans2026.find(p => p.sector === sector && p.activity === activity);
    if (!data) return;
    document.getElementById('modal-tag').innerText = "2026 年度计划";
    document.getElementById('modal-title').innerText = data.time + " · " + data.sector;
    document.getElementById('modal-body').innerHTML = `
        <div class="col-span-2 bg-[#def1f5] p-10 rounded-[32px] border border-[#bacbe3]">
            <h4 class="text-2xl font-bold text-slate-800 mb-4">${escapeHtml(data.activity)}</h4>
            <div class="flex flex-wrap gap-3 mb-8">
                <span class="px-4 py-1.5 bg-white rounded-full text-xs font-bold shadow-sm">执行单位：${escapeHtml(data.sector)}</span>
                <span class="px-4 py-1.5 bg-white rounded-full text-xs font-bold shadow-sm">活动类型：${escapeHtml(data.type)}</span>
                <span class="px-4 py-1.5 bg-white rounded-full text-xs font-bold shadow-sm">时间：2026年${escapeHtml(data.time)}</span>
            </div>
            <div class="bg-white p-6 rounded-2xl">
                <h5 class="font-bold text-slate-800 mb-2">活动计划说明</h5>
                <p class="text-sm text-slate-500">该活动已列入2026年度履职计划，由${escapeHtml(data.sector)}负责组织实施，拟于2026年${escapeHtml(data.time)}开展。活动类型为${escapeHtml(data.type)}，旨在通过政协平台深化协商民主、凝聚各界智慧、助推上城高质量发展。</p>
            </div>
        </div>
    `;
    document.getElementById('modal-container').style.display = 'flex';
}

function showStudioDetail(id) {
    const data = studios.find(s => s.id === id);
    if (!data) return;
    document.getElementById('modal-tag').innerText = "工作室详情";
    document.getElementById('modal-title').innerText = data.name;
    const relatedActivity = activities.find(a => a.unit === data.name);
    document.getElementById('modal-body').innerHTML = `
        <div class="col-span-2 bg-[#3a67ab] p-10 text-white rounded-3xl flex justify-between flex-wrap gap-4">
            <div><p class="text-[#bacbe3] text-[10px] font-bold">领衔委员</p><h3 class="text-3xl font-black">${escapeHtml(data.leader)}</h3></div>
            <div class="text-right"><p class="text-[#bacbe3] text-[10px] font-bold">星级评定</p><h3 class="text-3xl font-black">${starHtml(data.rating)}</h3></div>
        </div>
        <div class="col-span-2 p-8 border border-[#bacbe3] rounded-3xl">
            <h4 class="font-bold mb-2">工作室亮点</h4>
            <p class="text-slate-500 font-medium">${escapeHtml(data.feature || '全心全意为民服务')}</p>
            <p class="text-sm text-slate-400 mt-6 border-t border-[#bacbe3] pt-4 italic">📍 ${escapeHtml(data.address)}</p>
        </div>
        ${relatedActivity ? `
        <div class="col-span-2">
            <img src="${BASE_PATH+escapeHtml(relatedActivity.img)}" class="w-full rounded-2xl shadow-lg max-h-64 object-cover cursor-pointer" onclick="openLightbox('${BASE_PATH+escapeHtml(relatedActivity.img)}')" onerror="this.style.display='none'">
            <p class="text-xs text-slate-400 mt-2 text-center">${escapeHtml(relatedActivity.title)}</p>
        </div>` : ''}
    `;
    document.getElementById('modal-container').style.display = 'flex';
}

function closeModal() { document.getElementById('modal-container').style.display = 'none'; }

// ===== TAB SWITCHING =====
function switchTab(type, el) {
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    el.classList.add('active');
    renderStats(type);
    if(type === 'sectors') renderSectors();
    if(type === 'plans') renderPlans();
    if(type === 'studios') renderStudios();
    if(type === 'activities') renderActivities();
    if(type === 'streets') renderStreets();
}

// Init
renderStats('sectors');
renderSectors();
</script>
</body>
</html>
